<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MU Steak House - Catálogo y Pedido</title>
    <!-- Iconos rústicos e industriales -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #12100e;
            --card-bg: #1a1613;
            --wood-light: #d4a373;
            --wood-dark: #8b5a2b;
            --text-light: #f4f1de;
            --accent-iron: #4a4540;
            --btn-whatsapp: #25d366;
            --btn-whatsapp-hover: #128c7e;
            --btn-remove: #cc4444;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            padding-bottom: 120px; /* Espacio extra para el carrito flotante */
        }

        /* --- HEADER BANNER --- */
        header {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('logo.jpg') center/cover no-repeat;
            text-align: center;
            height: 250px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-bottom: 4px solid var(--wood-light);
            padding: 0 20px;
        }

        header p {
            color: var(--text-light);
            font-style: italic;
            font-size: 1.5rem;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* --- Vista de Categorías --- */
        .grid-categorias {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 25px;
        }

        .cat-card {
            background-color: var(--card-bg);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--accent-iron);
            cursor: pointer;
            transition: transform 0.3s, border-color 0.3s;
            position: relative;
        }

        .cat-card:hover { transform: scale(1.03); border-color: var(--wood-light); }

        .cat-img { width: 100%; height: 220px; object-fit: cover; filter: grayscale(30%); transition: filter 0.3s; }
        .cat-card:hover .cat-img { filter: grayscale(0%); }

        .cat-title {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 20px 15px; margin: 0; font-size: 1.3rem;
            text-transform: uppercase; text-align: center; letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        /* --- Vistas de Catálogos Ocultos --- */
        .catalogo-seccion { display: none; }

        .encabezado-catalogo {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; border-bottom: 2px solid var(--wood-light); padding-bottom: 15px;
        }

        .btn-volver {
            background-color: var(--accent-iron); color: var(--text-light);
            border: 1px solid var(--wood-light); padding: 8px 15px;
            font-weight: bold; cursor: pointer; border-radius: 4px;
            text-transform: uppercase; transition: background 0.3s;
            font-size: 0.8rem; display: flex; align-items: center; gap: 6px;
        }
        .btn-volver:hover { background-color: var(--wood-dark); }

        .seccion-titulo { font-size: 1.8rem; text-transform: uppercase; margin: 0; color: var(--wood-light); }

        /* --- Grid de Productos --- */
        .grid-productos {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));gap: 30px;
        }

        .prod-card {
            background-color: var(--card-bg); border-radius: 6px;
            border: 1px solid var(--accent-iron); overflow: hidden;
            display: flex; flex-direction: column;
        }

        .prod-img-container { width: 100%; height: 180px; overflow: hidden; }
        .prod-img { width: 100%; height: 100%; object-fit: cover; }

        .prod-info { padding: 15px; display: flex; flex-direction: column; flex-grow: 1; }
        .prod-name { margin: 0 0 8px 0; font-size: 1.2rem; color: var(--text-light); }
        .prod-desc { font-size: 0.9rem; color: #b3a9a0; margin: 0 0 12px 0; flex-grow: 1; line-height: 1.4; }

        .prod-metadata {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: auto; padding-top: 12px; border-top: 1px solid rgba(74, 69, 64, 0.3);
        }

        .prod-precio { font-size: 1.3rem; color: var(--wood-light); font-weight: bold; }

        .btn-add-cart {
            background-color: var(--wood-dark); color: white;
            text-align: center; padding: 8px 12px;
            border: none; font-weight: bold; border-radius: 4px;
            cursor: pointer; text-transform: uppercase;
            font-size: 0.8rem; display: flex; align-items: center; gap: 6px;
            transition: background 0.3s;
        }
        .btn-add-cart:hover { background-color: var(--wood-light); }

        /* --- SECCIÓN DEL CARRITO FLOTANTE --- */
        #carrito-flotante {
            position: fixed; bottom: 0; left: 0; right: 0;
            background-color: var(--card-bg);
            border-top: 3px solid var(--wood-light);
            padding: 15px 20px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
            z-index: 200;
            display: none; /* Oculto si está vacío por JS */
            justify-content: space-between; align-items: center;
        }

        .info-carrito { display: flex; align-items: center; gap: 15px; color: var(--text-light); }
        .icono-carrito { font-size: 1.8rem; color: var(--wood-light); }
        .resumen-carrito { display: flex; flex-direction: column; }
        .cant-items { font-weight: bold; font-size: 1.1rem; }
        .total-items { color: var(--wood-light); }

        .acciones-carrito { display: flex; gap: 10px; }

        .btn-ver-pedido {
            background-color: var(--accent-iron); color: white;
            padding: 10px 20px; border: 1px solid var(--wood-light);
            font-weight: bold; border-radius: 4px; cursor: pointer;
            text-transform: uppercase; font-size: 0.9rem;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-ver-pedido:hover { background-color: var(--wood-dark); }

        /* --- MODAL DETALLE DEL PEDIDO --- */
        #modal-pedido {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
            z-index: 300; display: none;
            justify-content: center; align-items: center;
        }

        .modal-content {
            background-color: var(--card-bg);
            border: 2px solid var(--wood-light);
            border-radius: 8px;
            width: 90%; max-width: 500px;
            max-height: 85vh; overflow-y: auto;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            position: relative;
        }

        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; border-bottom: 1px solid var(--accent-iron);
            padding-bottom: 10px;
        }
        .modal-header h3 { margin: 0; color: var(--wood-light); text-transform: uppercase; letter-spacing: 1px; }
        .close-modal { background: none; border: none; color: #777; font-size: 1.8rem; cursor: pointer; padding: 0; }
        .close-modal:hover { color: var(--text-light); }

        #lista-pedido-detallado { list-style: none; padding: 0; margin: 0; }
        .item-pedido {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid rgba(74,69,64,0.3);
        }
        .item-info { display: flex; flex-direction: column; gap: 2px; }
        .item-nombre { font-weight: bold; color: var(--text-light); font-size: 1rem; }
        .item-precio-unid { font-size: 0.85rem; color: #888; }
        
        .item-acciones { display: flex; align-items: center; gap: 15px; }
        .btn-remove-item {
            background: none; border: none; color: var(--btn-remove);
            cursor: pointer; font-size: 1.2rem; padding: 0;
            transition: color 0.2s;
        }
        .btn-remove-item:hover { color: #ff6666; }

        .modal-footer {
            margin-top: 25px; padding-top: 15px;
            border-top: 1px solid var(--accent-iron);
            display: flex; flex-direction: column; gap: 20px;
        }
        .total-pedido-modal {
            font-size: 1.5rem; font-weight: bold;
            color: var(--wood-light); text-align: right;
        }

        .btn-enviar-pedido {
            background-color: var(--btn-whatsapp); color: white;
            padding: 12px 20px; border: none;
            font-weight: bold; border-radius: 4px; cursor: pointer;
            text-transform: uppercase; font-size: 1rem;
            display: flex; align-items: center; gap: 8px; justify-content: center;
            width: 100%; transition: background 0.3s;
        }
        .btn-enviar-pedido:hover { background-color: var(--btn-whatsapp-hover); }

        footer {
            text-align: center; padding: 30px 20px;
            color: #554e48; font-size: 0.85rem;
            margin-top: 50px; border-top: 1px solid var(--accent-iron);
        }
    </style>
</head>
<body>

    <header>
        <p>"Aquí no hay clientes, hay amigos"</p>
    </header>

    <div class="container">

        <!-- VISTA 1: CUATRO CATEGORÍAS PRINCIPALES -->
        <div id="vista-categorias" class="grid-categorias">
            
            <div class="cat-card" onclick="mostrarSeccion('premium', 'Cortes Premium')">
                <img src="cortes premium.png" class="cat-img" alt="Cortes Premium">
                <h3 class="cat-title">Cortes Premium</h3>
            </div>

            <div class="cat-card" onclick="mostrarSeccion('diarios', 'Para todos los días')">
                <img src="todos los días.jpeg" class="cat-img" alt="Cortes Diarios">
                <h3 class="cat-title">Para todos los días</h3>
            </div>

            <div class="cat-card" onclick="mostrarSeccion('achuras', 'Achuras y Embutidos')">
                <img src="achuras.jpeg" class="cat-img" alt="Achuras y Embutidos">
                <h3 class="cat-title">Achuras y Embutidos</h3>
            </div>

            <div class="cat-card" onclick="mostrarSeccion('parrilla', 'Para la Parrilla')">
                <img src="para la parrilla.jpeg" class="cat-img" alt="Para la Parrilla">
                <h3 class="cat-title">Para la Parrilla</h3>
            </div>

        </div>

        <!-- VISTA 2: CATÁLOGO DINÁMICO (Oculto por defecto) -->
        <div id="vista-catalogo" class="catalogo-seccion">
            <div class="encabezado-catalogo">
                <h2 id="catalogo-titulo" class="seccion-titulo">Título Categoría</h2>
                <button class="btn-volver" onclick="volverACategorias()">
                    <i class="fa-solid fa-arrow-left"></i> Categorías
                </button>
            </div>
            
            <div id="grid-productos-dinamico" class="grid-productos">
                <!-- Los productos se cargarán aquí automáticamente por JS -->
            </div>
        </div>

    </div>

    <!-- SECCIÓN DEL CARRITO FLOTANTE (Oculto si vacío) -->
    <div id="carrito-flotante">
        <div class="info-carrito">
            <div class="icono-carrito"><i class="fa-solid fa-basket-shopping"></i></div>
            <div class="resumen-carrito">
                <span id="cant-items-carrito" class="cant-items">0 artículos</span>
                <span id="total-carrito" class="total-items">$ 0</span>
            </div>
        </div>
        <div class="acciones-carrito">
            <button class="btn-ver-pedido" onclick="abrirModalPedido()">
                <i class="fa-solid fa-list-check"></i> Revisar Pedido
            </button>
        </div>
    </div>

    <!-- MODAL DETALLE DEL PEDIDO (Ventana emergente) -->
    <div id="modal-pedido">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Tu Pedido</h3>
                <button class="close-modal" onclick="cerrarModalPedido()">&times;</button>
            </div>
            <ul id="lista-pedido-detallado">
                <!-- Items del pedido detallados por JS -->
            </ul>
            <div class="modal-footer">
                <div id="total-pedido-modal" class="total-pedido-modal">Total: $ 0</div>
                <!-- ESTE ES TU NUEVO BOTÓN DE WHATSAPP -->
                <button class="btn-enviar-pedido" onclick="enviarPedidoWhatsApp()">
                    <i class="fa-brands fa-whatsapp"></i> Confirmar y Enviar por WhatsApp
                </button>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 MU Steak House. Todos los derechos reservados. | Montevideo, Uruguay</p>
    </footer>

    <!-- LÓGICA DEL CARRITO Y PEDIDO (JavaScript Revisado) -->
    <script>
        // BASE DE DATOS DE PRODUCTOS (6 por categoría, USANDO TUS FOTOS)
        const productosDB = {
            'premium': [
                { id: 'p1', name: 'Ojo de Bife Exportación', desc: 'Marmoleo excepcional, jugosidad.', price: 850, img: 'cortes premium.png' },

                { id: 'p6', name: 'Carré de Cordero', desc: 'Corte delicado y tierno, especial.', price: 1350, img: 'cortes premium.png' }
            ],
            'diarios': [
                { id: 'd1', name: 'Pulpa para Milanesas', desc: 'Fileteada fina y tierna, lista.', price: 580, img: 'todos los días.jpeg' },
                { id: 'd2', name: 'Carne Picada Especial', desc: 'Molida en el día, porcentaje justo de grasa.', price: 420, img: 'todos los días.jpeg' },
                { id: 'd3', name: 'Nalga sin Tapa', desc: 'Magro y versátil, para guisos.', price: 610, img: 'todos los días.jpeg' },
                { id: 'd4', name: 'Cuadril Entero', desc: 'Excelente calidad-precio para horno.', price: 650, img: 'todos los días.jpeg' },
                { id: 'd5', name: 'Peceto Especial', desc: 'Magro y tierno, para vitel toné.', price: 720, img: 'todos los días.jpeg' },
                { id: 'd6', name: 'Bola de Lomo', desc: 'Ideal para milanesas tiernas.', price: 590, img: 'todos los días.jpeg' }
            ],
            'achuras': [
                { id: 'a1', name: 'Chorizo de Cerdo MU', desc: 'Artesanal propio, 100% seleccionado.', price: 450, img: 'achuras.jpeg' },
                { id: 'a2', name: 'Mollejas de Bife', desc: 'Tiernas y crocantes. Un manjar.', price: 890, img: 'achuras.jpeg' },
                { id: 'a3', name: 'Chinchulines Premium', desc: 'Limpios y listos, trenzados.', price: 380, img: 'achuras.jpeg' },
                { id: 'a4', name: 'Morcilla Dulce/Salada', desc: 'Suaves y sabrosas, receta tradicional.', price: 320, img: 'achuras.jpeg' },
                { id: 'a5', name: 'Salchicha Parrillera', desc: 'Fina y condimentada, para el copetín.', price: 480, img: 'achuras.jpeg' },
                { id: 'a6', name: 'Pamplona de Pollo', desc: 'Rellena de queso, jamón y panceta.', price: 250, img: 'achuras.jpeg' }
            ],
            'parrilla': [
                { id: 'pa1', name: 'Asado de Tira Ancho', desc: 'Clásico uruguayo con sabor tradicional.', price: 620, img: 'para la parrilla.jpeg' },
                { id: 'pa2', name: 'Vacío Especial', desc: 'Crocante por fuera y tierno por dentro.', price: 680, img: 'para la parrilla.jpeg' },
                { id: 'pa3', name: 'Colita de Cuadril', desc: 'Tierno y sin hueso, para horno.', price: 750, img: 'para la parrilla.jpeg' },
                { id: 'pa4', name: 'Matambre Vacuno', desc: 'Tierno y sabroso. Perfecto a la pizza.', price: 590, img: 'para la parrilla.jpeg' },
                { id: 'pa5', name: 'Costillar Entero', desc: 'Para fanáticos del asado lento.', price: 550, img: 'para la parrilla.jpeg' },
                { id: 'pa6', name: 'Bondiola de Cerdo', desc: 'Jugosa y sabrosa, para lenta.', price: 490, img: 'para la parrilla.jpeg' }
            ]
        };

        // TU NÚMERO DE WHATSAPP REAL
        const tuNumeroWhatsApp = '59892684093';

        // ESTADO DEL CARRITO (Se carga de localStorage si existe)
        let carrito = JSON.parse(localStorage.getItem('mu_carrito')) || [];

        // --- FUNCIONES DE NAVEGACIÓN ---
        function mostrarSeccion(idCategoria, tituloCategoria) {
            // Ocultar la grilla principal
            document.getElementById('vista-categorias').style.display = 'none';
            
            // Configurar el título
            document.getElementById('catalogo-titulo').innerText = tituloCategoria;
            
            // Limpiar y cargar productos
            const gridDinamico = document.getElementById('grid-productos-dinamico');
            gridDinamico.innerHTML = '';
            
            const listaProductos = productosDB[idCategoria];
            
            if (listaProductos) {
                listaProductos.forEach(producto => {
                    gridDinamico.innerHTML += `
                        <div class="prod-card">
                            <div class="prod-img-container">
                                <img src="${producto.img}" class="prod-img" alt="${producto.name}">
                            </div>
                            <div class="prod-info">
                                <h3 class="prod-name">${producto.name}</h3>
                                <p class="prod-desc">${producto.desc}</p>
                                <div class="prod-metadata">
                                    <div class="prod-precio">$ ${producto.price}</div>
                                    <button class="btn-add-cart" onclick="agregarAlCarrito('${producto.id}', '${idCategoria}')">
                                        <i class="fa-solid fa-cart-plus"></i> Agregar
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }
            
            // Mostrar catálogo y subir pantalla
            document.getElementById('vista-catalogo').style.display = 'block';
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function volverACategorias() {
            document.getElementById('vista-catalogo').style.display = 'none';
            document.getElementById('vista-categorias').style.display = 'grid';
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        // --- LÓGICA DEL CARRITO ---
        function guardarCarritoLocalStorage() {
            localStorage.setItem('mu_carrito', JSON.stringify(carrito));
        }

        function actualizarInterfazCarrito() {
            const flotante = document.getElementById('carrito-flotante');
            const cantLabel = document.getElementById('cant-items-carrito');
            const totalLabel = document.getEl
