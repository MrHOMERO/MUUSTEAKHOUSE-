<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MU Steak House - Catálogo</title>
    <!-- Iconos para el logo de WhatsApp y otros -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #12100e;
            --card-bg: #1a1613;
            --wood-light: #d4a373;
            --wood-dark: #8b5a2b;
            --text-light: #f4f1de;
            --accent-iron: #4a4540;
            --btn-whatsapp: #25d366;
            --btn-whatsapp-hover: #128c7e;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            padding-bottom: 80px; /* Espacio para el botón flotante */
        }

        /* --- NUEVO HEADER CON logo.jpg BANNER COMPLETO --- */
        header {
            /* Usamos logo.jpg como fondo cubriendo todo */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('logo.jpg') center/cover no-repeat;
            text-align: center;
            /* Altura fija para el banner, ajústala si lo prefieres */
            height: 300px; 
            display: flex;
            flex-direction: column;
            justify-content: center; /* Centra el contenido verticalmente */
            align-items: center;    /* Centra el contenido horizontalmente */
            border-bottom: 4px solid var(--wood-light);
            padding: 0 20px;
        }

        header p {
            color: var(--text-light); /* Texto en blanco sobre el fondo oscuro */
            font-style: italic;
            font-size: 1.5rem; /* Tamaño de letra legible */
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); /* Sombra para resaltar el texto */
        }
        /* --- FIN DEL NUEVO HEADER --- */

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Vista de Categorías Principales */
        .grid-categorias {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 25px;
        }

        .cat-card {
            background-color: var(--card-bg);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--accent-iron);
            cursor: pointer;
            transition: transform 0.3s, border-color 0.3s;
            position: relative;
        }

        .cat-card:hover {
            transform: scale(1.03);
            border-color: var(--wood-light);
        }

        .cat-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            filter: grayscale(30%);
            transition: filter 0.3s;
        }

        .cat-card:hover .cat-img {
            filter: grayscale(0%);
        }

        .cat-title {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 20px 15px;
            margin: 0;
            font-size: 1.4rem;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        /* Vistas de Catálogos Ocultos por defecto */
        .catalogo-seccion {
            display: none;
        }

        .encabezado-catalogo {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--wood-light);
            padding-bottom: 15px;
        }

        .btn-volver {
            background-color: var(--accent-iron);
            color: var(--text-light);
            border: 1px solid var(--wood-light);
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            transition: background 0.3s;
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-volver:hover {
            background-color: var(--wood-dark);
        }

        .seccion-titulo {
            font-size: 2rem;
            text-transform: uppercase;
            margin: 0;
            color: var(--wood-light);
            letter-spacing: 1px;
        }

        /* Grid de Productos */
        .grid-productos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .prod-card {
            background-color: var(--card-bg);
            border-radius: 6px;
            border: 1px solid var(--accent-iron);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .prod-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .prod-img-container {
            width: 100%;
            height: 200px;
            overflow: hidden;
            border-bottom: 2px solid var(--accent-iron);
        }

        .prod-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .prod-card:hover .prod-img {
            transform: scale(1.1);
        }

        .prod-info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .prod-name {
            margin: 0 0 10px 0;
            font-size: 1.3rem;
            color: var(--text-light);
        }

        .prod-desc {
            font-size: 0.95rem;
            color: #b3a9a0;
            margin: 0 0 15px 0;
            flex-grow: 1;
            line-height: 1.4;
        }

        .prod-metadata {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid rgba(74, 69, 64, 0.5);
        }

        .prod-precio {
            font-size: 1.4rem;
            color: var(--wood-light);
            font-weight: bold;
        }

        .btn-pedir {
            background-color: var(--btn-whatsapp);
            color: white;
            text-align: center;
            padding: 10px 15px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            transition: background 0.3s;
            text-transform: uppercase;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-pedir:hover {
            background-color: var(--btn-whatsapp-hover);
        }

        /* Botón Flotante de WhatsApp */
        .wpp-flotante {
            position: fixed;
            width: 60px;
            height: 60px;
            bottom: 20px;
            right: 20px;
            background-color: var(--btn-whatsapp);
            color: #fff;
            border-radius: 50px;
            text-align: center;
            font-size: 30px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.4);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: transform 0.3s, background-color 0.3s;
        }

        .wpp-flotante:hover {
            transform: scale(1.1);
            background-color: var(--btn-whatsapp-hover);
        }

        footer {
            text-align: center;
            padding: 30px 20px;
            color: #554e48;
            font-size: 0.85rem;
            margin-top: 50px;
            border-top: 1px solid var(--accent-iron);
        }
    </style>
</head>
<body>

    <!-- BOTÓN FLOTANTE DE WHATSAPP CON TU NÚMERO -->
    <a href="https://wa.me/59892684093?text=Hola!%20Quiero%20hacer%20una%20consulta%20sobre%20el%20catálogo." class="wpp-flotante" target="_blank" title="Contáctanos">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <header>
        <!-- Mantenido solo el subtítulo con el texto solicitado -->
        <p>"Aquí no hay clientes, hay amigos"</p>
    </header>

    <div class="container">

        <!-- VISTA 1: CUATRO CATEGORÍAS PRINCIPALES -->
        <div id="vista-categorias" class="grid-categorias">
            
            <div class="cat-card" onclick="mostrarSeccion('premium', 'Cortes Premium')">
                <img src="cortes premium.png" class="cat-img" alt="Cortes Premium">
                <h3 class="cat-title">Cortes Premium</h3>
            </div>

            <div class="cat-card" onclick="mostrarSeccion('diarios', 'Para todos los días')">
                <img src="todos los días.jpeg" class="cat-img" alt="Cortes Diarios">
                <h3 class="cat-title">Para todos los días</h3>
            </div>

            <div class="cat-card" onclick="mostrarSeccion('achuras', 'Achuras y Embutidos')">
                <img src="achuras.jpeg" class="cat-img" alt="Achuras y Embutidos">
                <h3 class="cat-title">Achuras y Embutidos</h3>
            </div>

            <div class="cat-card" onclick="mostrarSeccion('parrilla', 'Para la Parrilla')">
                <img src="para la parrilla.jpeg" class="cat-img" alt="Para la Parrilla">
                <h3 class="cat-title">Para la Parrilla</h3>
            </div>

        </div>

        <!-- VISTA 2: CATÁLOGO DINÁMICO (Se llena con JS) -->
        <div id="vista-catalogo" class="catalogo-seccion">
            <div class="encabezado-catalogo">
                <h2 id="catalogo-titulo" class="seccion-titulo">Título Categoría</h2>
                <button class="btn-volver" onclick="volverACategorias()">
                    <i class="fa-solid fa-arrow-left"></i> Volver
                </button>
            </div>
            
            <div id="grid-productos-dinamico" class="grid-productos">
                <!-- Los productos se cargarán aquí automáticamente -->
            </div>
        </div>

    </div>

    <footer>
        <p>&copy; 2026 MU Steak House. Todos los derechos reservados. | Montevideo, Uruguay</p>
    </footer>

    <!-- LÓGICA INTERACTIVA PARA CARGAR PRODUCTOS -->
    <script>
        // BASE DE DATOS DE PRODUCTOS (6 por categoría)
        const productos = {
            'premium': [
                { name: 'Ojo de Bife Exportación', desc: 'Marmoleo excepcional, jugosidad y ternura inigualables.', price: '$ 850 / kg', img: 'cortes premium.png' },
                { name: 'Tomahawk Steak', desc: 'Corte imponente con hueso largo, ideal para lucirse en el fuego.', price: '$ 1200 / kg', img: 'cortes premium.png' },
                { name: 'Picaña Premium', desc: 'Capa de grasa perfecta para un sabor tradicional brasileño.', price: '$ 980 / kg', img: 'cortes premium.png' },
                { name: 'Entraña Fina', desc: 'Sabor intenso y textura única. Se cocina rápido y es deliciosa.', price: '$ 950 / kg', img: 'cortes premium.png' },
                { name: 'T-Bone Steak', desc: 'Dos cortes en uno: Lomo y Bife Angosto separados por el hueso.', price: '$ 1100 / kg', img: 'cortes premium.png' },
                { name: 'Carré de Cordero', desc: 'Corte delicado y tierno, perfecto para una cena especial.', price: '$ 1350 / kg', img: 'cortes premium.png' }
            ],
            'diarios': [
                { name: 'Pulpa para Milanesas', desc: 'Fileteada fina y tierna, lista para rebozar y cocinar.', price: '$ 580 / kg', img: 'todos los días.jpeg' },
                { name: 'Carne Picada Especial', desc: 'Molida en el día con el porcentaje justo de grasa.', price: '$ 420 / kg', img: 'todos los días.jpeg' },
                { name: 'Nalga sin Tapa', desc: 'Corte magro y versátil, ideal para guisos o churrascos.', price: '$ 610 / kg', kg: '1kg', img: 'todos los días.jpeg' },
                { name: 'Cuadril Entero', desc: 'Excelente relación calidad-precio para horno o parrilla.', price: '$ 650 / kg', img: 'todos los días.jpeg' },
                { name: 'Peceto Especial', desc: 'Corte magro y tierno, perfecto para vitel toné o al horno.', price: '$ 720 / kg', img: 'todos los días.jpeg' },
                { name: 'Bola de Lomo', desc: 'Ideal para milanesas tiernas o para rellenar.', price: '$ 590 / kg', img: 'todos los días.jpeg' }
            ],
            'achuras': [
                { name: 'Chorizo de Cerdo MU', desc: 'Elaboración artesanal propia con carne 100% seleccionada.', price: '$ 450 / kg', img: 'achuras.jpeg' },
                { name: 'Mollejas de Bife', desc: 'Tiernas y crocantes por fuera. Un manjar indispensable.', price: '$ 890 / kg', img: 'achuras.jpeg' },
                { name: 'Chinchulines Premium', desc: 'Limpios y listos para la parrilla. Trenzados o crocantes.', price: '$ 380 / kg', img: 'achuras.jpeg' },
                { name: 'Morcilla Dulce/Salada', desc: 'Suaves y sabrosas, receta tradicional de la casa.', price: '$ 320 / kg', img: 'achuras.jpeg' },
                { name: 'Salchicha Parrillera', desc: 'Fina y condimentada, perfecta para el copetín inicial.', price: '$ 480 / kg', img: 'achuras.jpeg' },
                { name: 'Pamplona de Pollo', desc: 'Rellena de queso, jamón y panceta. Lista para el fuego.', price: '$ 250 / unid', img: 'achuras.jpeg' }
            ],
            'parrilla': [
                { name: 'Asado de Tira Ancho', desc: 'Corte clásico uruguayo con sabor tradicional indispensable.', price: '$ 620 / kg', img: 'para la parrilla.jpeg' },
                { name: 'Vacío Especial', desc: 'Crocante por fuera y tierno por dentro. Lenta cocción.', price: '$ 680 / kg', img: 'para la parrilla.jpeg' },
                { name: 'Colita de Cuadril', desc: 'Corte tierno y sin hueso, ideal para horno o parrilla.', price: '$ 750 / kg', img: 'para la parrilla.jpeg' },
                { name: 'Matambre Vacuno', desc: 'Tierno y sabroso. Perfecto para hacer a la pizza.', price: '$ 590 / kg', img: 'para la parrilla.jpeg' },
                { name: 'Costillar Entero', desc: 'Para los fanáticos del asado lento y con mucha paciencia.', price: '$ 550 / kg', img: 'para la parrilla.jpeg' },
                { name: 'Bondiola de Cerdo', desc: 'Jugosa y sabrosa, ideal para marinar y hacer lenta.', price: '$ 490 / kg', img: 'para la parrilla.jpeg' }
            ]
        };

        const tuNumeroWhatsApp = '59892684093';

        function mostrarSeccion(idCategoria, tituloCategoria) {
            // 1. Ocultar categorías principales
            document.getElementById('vista-categorias').style.display = 'none';
            
            // 2. Configurar el título del catálogo
            document.getElementById('catalogo-titulo').innerText = tituloCategoria;
            
            // 3. Limpiar y cargar los productos dinámicamente
            const gridDinamico = document.getElementById('grid-productos-dinamico');
            gridDinamico.innerHTML = ''; // Limpiar productos anteriores
            
            const listaProductos = productos[idCategoria];
            
            if (listaProductos) {
                listaProductos.forEach(producto => {
                    const cardHTML = `
                        <div class="prod-card">
                            <div class="prod-img-container">
                                <img src="${producto.img}" class="prod-img" alt="${producto.name}">
                            </div>
                            <div class="prod-info">
                                <h3 class="prod-name">${producto.name}</h3>
                                <p class="prod-desc">${producto.desc}</p>
                                <div class="prod-metadata">
                                    <div class="prod-precio">${producto.price}</div>
                                    <a href="https://wa.me/${tuNumeroWhatsApp}?text=Hola!%20Me%20interesa%20encargar:%20${encodeURIComponent(producto.name)}" target="_blank" class="btn-pedir">
                                        <i class="fa-brands fa-whatsapp"></i> Pedir
                                    </a>
                                </div>
                            </div>
                        </div>
                    `;
                    gridDinamico.innerHTML += cardHTML;
                });
            } else {
                gridDinamico.innerHTML = '<p style="text-align:center; color:#777; grid-column: 1/-1;">Próximamente más productos en esta sección.</p>';
            }
            
            // 4. Mostrar la vista del catálogo
            document.getElementById('vista-catalogo').style.display = 'block';
            
            // 5. Subir la pantalla al inicio
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function volverACategorias() {
            // Ocultar la vista del catálogo
            document.getElementById('vista-catalogo').style.display = 'none';
            
            // Mostrar las categorías principales
            document.getElementById('vista-categorias').style.display = 'grid';
            
            // Subir la pantalla
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    </script>
</body>
</html>
