<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MU Steak House - Catálogo y Pedido Inteligente</title>
    <!-- Iconos rústicos e industriales -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #12100e;
            --card-bg: #1a1613;
            --wood-light: #d4a373;
            --wood-dark: #8b5a2b;
            --text-light: #f4f1de;
            --accent-iron: #4a4540;
            --btn-whatsapp: #25d366;
            --btn-whatsapp-hover: #128c7e;
            --tic-azul: #3b82f6; /* Color azul para la selección */
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            padding-bottom: 120px; /* Espacio extra para el panel flotante */
        }

        /* --- HEADER BANNER --- */
        header {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('logo.jpg') center/cover no-repeat;
            text-align: center;
            height: 250px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-bottom: 4px solid var(--wood-light);
            padding: 0 20px;
        }

        header p {
            color: var(--text-light);
            font-style: italic;
            font-size: 1.5rem;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* --- Vista de Categorías Principales --- */
        .grid-categorias {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 25px;
        }

        .cat-card {
            background-color: var(--card-bg);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--accent-iron);
            cursor: pointer;
            transition: transform 0.3s, border-color 0.3s;
            position: relative;
        }

        .cat-card:hover { transform: scale(1.03); border-color: var(--wood-light); }

        .cat-img { width: 100%; height: 250px; object-fit: cover; filter: grayscale(30%); transition: filter 0.3s; }
        .cat-card:hover .cat-img { filter: grayscale(0%); }

        .cat-title {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 20px 15px; margin: 0; font-size: 1.4rem;
            text-transform: uppercase; text-align: center; letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        /* --- Vistas de Catálogos --- */
        .catalogo-seccion { display: none; }

        .encabezado-catalogo {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; border-bottom: 2px solid var(--wood-light); padding-bottom: 15px;
        }

        .btn-volver {
            background-color: var(--accent-iron); color: var(--text-light);
            border: 1px solid var(--wood-light); padding: 8px 15px;
            font-weight: bold; cursor: pointer; border-radius: 4px;
            text-transform: uppercase; transition: background 0.3s;
            text-decoration: none; font-size: 0.8rem;
            display: flex; align-items: center; gap: 6px;
        }
        .btn-volver:hover { background-color: var(--wood-dark); }

        .seccion-titulo { font-size: 1.8rem; text-transform: uppercase; margin: 0; color: var(--wood-light); letter-spacing: 1px; }

        /* --- Grid de Productos --- */
        .grid-productos {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));gap: 30px;
        }

        .prod-card {
            background-color: var(--card-bg); border-radius: 6px;
            border: 1px solid var(--accent-iron); overflow: hidden;
            display: flex; flex-direction: column; transition: border-color 0.3s, transform 0.2s;
            position: relative;
        }

        .prod-card.seleccionado { border-color: var(--tic-azul); border-width: 2px; transform: translateY(-3px); }

        .tic-seleccion {
            position: absolute; top: 10px; right: 10px; width: 30px; height: 30px;
            background-color: var(--tic-azul); color: white; border-radius: 50%;
            display: none; align-items: center; justify-content: center;
            font-size: 18px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); z-index: 10;
        }
        .prod-card.seleccionado .tic-seleccion { display: flex; }

        .prod-img-container { width: 100%; height: 200px; overflow: hidden; border-bottom: 2px solid var(--accent-iron); }
        .prod-img { width: 100%; height: 100%; object-fit: cover; }

        .prod-info { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }
        .prod-name { margin: 0 0 10px 0; font-size: 1.3rem; color: var(--text-light); }
        .prod-desc { font-size: 0.95rem; color: #b3a9a0; margin: 0 0 15px 0; flex-grow: 1; line-height: 1.4; }

        .prod-metadata {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: auto; padding-top: 15px; border-top: 1px solid rgba(74, 69, 64, 0.3);
        }
        .prod-precio { font-size: 1.4rem; color: var(--wood-light); font-weight: bold; }
        
        .prod-kg-controls { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
        .input-kg {
            width: 55px; background: transparent; border: 1px solid var(--accent-iron);
            color: var(--text-light); border-radius: 4px; padding: 6px; text-align: center;
            font-weight: bold; font-size: 1rem;
        }
        .subtotal-item { font-size: 0.9rem; color: #d4a373; margin-top: 10px; display: none; }
        .prod-card.seleccionado .subtotal-item { display: block; }

        #panel-envio {
            position: fixed; bottom: 0; left: 0; right: 0;
            background-color: var(--card-bg); border-top: 3px solid var(--wood-light);
            padding: 15px 30px; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
        }

        .info-seleccion { display: flex; align-items: center; gap: 15px; color: var(--text-light); }
        .icono-check { font-size: 2rem; color: var(--wood-light); }
        .resumen-seleccion { display: flex; flex-direction: column; }
        .cant-seleccionada { font-weight: bold; font-size: 1.2rem; }
        .total-compra { font-size: 1.4rem; color: var(--wood-light); font-weight: bold; }
        .txt-ayuda { font-size: 0.9rem; color: #777; }

        .btn-enviar-seleccion {
            background-color: var(--btn-whatsapp); color: white; padding: 12px 24px;
            font-weight: bold; border-radius: 4px; transition: background 0.3s;
            text-transform: uppercase; font-size: 0.9rem;
            display: flex; align-items: center; gap: 8px; border: none; cursor: pointer;
        }
        .btn-enviar-seleccion:hover { background-color: var(--btn-whatsapp-hover); }
        .btn-enviar-seleccion:disabled { background-color: #555; opacity: 0.6; cursor: not-allowed; }

        footer {
            text-align: center; padding: 30px 20px; color: #554e48; font-size: 0.85rem;
            margin-top: 50px; border-top: 1px solid var(--accent-iron);
        }
    </style>
</head>
<body>

    <header>
        <p>"Aquí no hay clientes, hay amigos"</p>
    </header>

    <div class="container">

        <!-- VISTA 1: CATEGORÍAS -->
        <div id="vista-categorias" class="grid-categorias">
            <div class="cat-card" onclick="mostrarSeccion('premium', 'Cortes Premium')">
                <img src="cortes premium.png" class="cat-img" alt="Cortes Premium">
                <h3 class="cat-title">Cortes Premium</h3>
            </div>
            <div class="cat-card" onclick="mostrarSeccion('diarios', 'Para todos los días')">
                <img src="todos los días.jpeg" class="cat-img" alt="Para todos los días">
                <h3 class="cat-title">Para todos los días</h3>
            </div>
            <div class="cat-card" onclick="mostrarSeccion('achuras', 'Achuras y Embutidos')">
                <img src="achuras.jpeg" class="cat-img" alt="Achuras y Embutidos">
                <h3 class="cat-title">Achuras y Embutidos</h3>
            </div>
            <div class="cat-card" onclick="mostrarSeccion('parrilla', 'Para la Parrilla')">
                <img src="para la parrilla.jpeg" class="cat-img" alt="Para la Parrilla">
                <h3 class="cat-title">Para la Parrilla</h3>
            </div>
        </div>

        <!-- VISTA 2: CATÁLOGO DINÁMICO (Llenado por JS) -->
        <div id="vista-catalogo" class="catalogo-seccion">
            <div class="encabezado-catalogo">
                <h2 id="catalogo-titulo" class="seccion-titulo">Título Categoría</h2>
                <button class="btn-volver" onclick="volverACategorias()">
                    <i class="fa-solid fa-arrow-left"></i> Categorías
                </button>
            </div>
            <div id="grid-productos-dinamico" class="grid-productos">
                <!-- Productos cargados por JS -->
            </div>
        </div>

    </div>

    <!-- PANEL FLOTANTE DE ENVÍO -->
    <div id="panel-envio">
        <div class="info-seleccion">
            <div class="icono-check"><i class="fa-solid fa-calculator"></i></div>
            <div class="resumen-seleccion">
                <span id="cant-seleccionada" class="cant-seleccionada">0 productos</span>
                <span id="total-compra" class="total-compra">TOTAL: $ 0</span>
                <span class="txt-ayuda">Ingresa kilos para sumar al total</span>
            </div>
        </div>
        <button id="btn-enviar" class="btn-enviar-seleccion" onclick="enviarPedidoWhatsApp()" disabled>
            <i class="fa-brands fa-whatsapp"></i> Confirmar y Enviar Pedido
        </button>
    </div>

    <footer>
        <p>&copy; 2026 MU Steak House. Todos los derechos reservados. | Montevideo, Uruguay</p>
    </footer>

    <!-- LA SOLUCIÓN ESTÁ AQUÍ EN EL SCRIPT -->

            };

            const tuNumeroWhatsApp = '59892684093';

            let pedidoMap = new Map();

            // --- NAVEGACIÓN ---
            // Las funciones ahora se declaran dentro de la función DOMContentLoaded

            window.mostrarSeccion = function(idCategoria, tituloCategoria) {
                document.getElementById('vista-categorias').style.display = 'none';
                document.getElementById('catalogo-titulo').innerText = tituloCategoria;
                const gridDinamico = document.getElementById('grid-productos-dinamico');
                gridDinamico.innerHTML = ''; 
                const listaProductos = productosDB[idCategoria];
                if (listaProductos) {
                    listaProductos.forEach(producto => {

                        const subtotalCargado = itemPedido ? itemPedido.cantidad * itemPedido.basePrice : 0;

                        gridDinamico.innerHTML += `

            window.volverACategorias = function() {

                        id: idProducto,
                        name: producto.name,
                        cantidad: cantidad,
                        basePrice: producto.basePrice
